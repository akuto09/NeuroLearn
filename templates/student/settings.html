{% extends "layouts/app_base.html" %}
{% block title %}Settings — NeuroLearn{% endblock %}
{% block sidenav %}
<a href="{{ url_for('student.dashboard') }}"><span class="ico">▦</span>Dashboard</a>
<a href="{{ url_for('student.courses') }}"><span class="ico">◧</span>Courses</a>
<a href="{{ url_for('student.assignments') }}"><span class="ico">✎</span>Assignments</a>
<a href="{{ url_for('student.tests') }}"><span class="ico">◎</span>Tests</a>
<a href="{{ url_for('student.progress') }}"><span class="ico">↗</span>Progress</a>
<a href="{{ url_for('student.ai_assistant') }}"><span class="ico">✦</span>AI Assistant</a>
<a href="{{ url_for('student.settings') }}" class="active"><span class="ico">⚙</span>Settings</a>
{% endblock %}
{% block content %}
<div class="app-topbar"><div><h1>Settings</h1><div class="sub">Manage your profile and preferences.</div></div></div>
<div class="panel" style="max-width:520px;">
  <form method="POST">
    <div class="field"><label>Full name</label><input type="text" value="{{ session.get('name') }}" name="name"></div>
    <div class="field"><label>Email</label><input type="email" value="{{ session.get('email') }}" disabled></div>
    <div class="field"><label>EEG device</label>
      <select name="device">
        <option>Simulated demo mode</option>
        <option>NeuroSky MindWave</option>
        <option>Emotiv Insight</option>
        <option>Muse S</option>
      </select>
    </div>
    <button class="btn btn-primary">Save changes</button>
  </form>
</div>
{% endblock %}
